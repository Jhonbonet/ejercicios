<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MecaMatic 3.0 - Sistema 300 Ejercicios</title>
<style>
:root {
    /* Paleta oficial MecaMatic por dedos */
    --pinky: #FFFFC0;    /* Meñique */
    --ring: #C0FFC0;     /* Anular */
    --middle: #C0FFFF;   /* Medio */
    --index-l: #FFC0FF;  /* Índice Izquierdo */
    --index-r: #FF96FF;  /* Índice Derecho */
    --thumb: #FFC0C0;    /* Pulgares (Espaciador) */
    --guia: #ff0000;
    --board-bg: #008282;
    --text-untyped: #ffffff;
    --text-typed: #000000;
}

body { font-family: 'Courier New', monospace; background-color: #C0C0C0; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
#inicio, #app { width: 95%; max-width: 1100px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid #888; }
.hidden { display: none; }

/* Pantalla de Copia */
.pantalla-verde { 
    font-size: 26px; background-color: var(--board-bg); color: var(--text-untyped); 
    border: 4px inset #004d40; padding: 20px; height: 130px; overflow: hidden; 
    letter-spacing: 2px; white-space: pre-wrap; line-height: 1.2; position: relative; margin-bottom: 20px;
}
#input-oculto { position: absolute; top: 0; left: 0; opacity: 0; pointer-events: none; }
.letra-hecha { color: var(--text-typed); }
.letra-guia { background-color: var(--guia); color: white !important; animation: blinker 0.8s linear infinite; }
@keyframes blinker { 50% { opacity: 0; } }

/* Layout Principal */
.contenedor-principal { display: flex; gap: 20px; }
.columna-izquierda { flex: 2.5; }
.sidebar-derecha { flex: 1; background: #f0f0f0; border: 2px solid #008282; border-radius: 8px; padding: 15px; height: 80vh; overflow-y: auto; }

/* TECLADO COMPLETO PROFESIONAL */
.teclado-container { background: #999; padding: 20px; border-radius: 12px; border: 3px solid #444; user-select: none; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
.fila-teclado { display: flex; justify-content: center; gap: 4px; margin-bottom: 6px; }
.tecla {
    width: 48px; height: 48px; background: white; border: 1px solid #000;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    font-weight: bold; font-size: 13px; border-radius: 5px; box-shadow: 2px 2px 0px #333;
}
/* Tamaños especiales */
.tecla.tab { width: 75px; }
.tecla.caps { width: 85px; }
.tecla.enter { width: 105px; flex-grow: 1; }
.tecla.shift-l { width: 115px; }
.tecla.shift-r { width: 115px; }
.tecla.espacio { width: 350px; background: var(--thumb); }

/* Asignación de Colores por Dedos */
.m-izq { background-color: var(--pinky); }   /* Meñique Izq */
.a-izq { background-color: var(--ring); }    /* Anular Izq */
.med-izq { background-color: var(--middle); } /* Medio Izq */
.i-izq { background-color: var(--index-l); }  /* Índice Izq */
.i-der { background-color: var(--index-r); }  /* Índice Der */
.med-der { background-color: var(--middle); } /* Medio Der */
.a-der { background-color: var(--ring); }    /* Anular Der */
.m-der { background-color: var(--pinky); }   /* Meñique Der */

/* Menu Lateral */
.btn-fase { padding: 12px; cursor: pointer; border: 2px solid #008282; background: #ddd; font-weight: bold; margin-bottom: 10px; width: 100%; border-radius: 5px; }
.btn-fase.active { background: #008282; color: white; }
.lista-ejercicios { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin: 10px 0 20px 0; }
.btn-ejer { font-size: 11px; padding: 6px; cursor: pointer; border: 1px solid #aaa; text-align: center; background: white; border-radius: 3px; }
.btn-ejer.done { background: #c0ffc0; border-color: #2e7d32; }
</style>
</head>
<body>

<div id="inicio">
    <h1 style="color:#008282; text-align:center;">MecaMatic 3.0</h1>
    <div style="text-align:center; padding: 20px; border: 2px dashed #008282;">
        <label>Nombre de Usuario:</label>
        <input type="text" id="user-id" style="padding: 5px;">
        <button onclick="login()" style="padding: 5px 15px; background: #008282; color:white; border:none; cursor:pointer;">ENTRAR</button>
    </div>
</div>

<div id="app" class="hidden">
    <div class="contenedor-principal">
        <div class="columna-izquierda">
            <div class="pantalla-verde" id="contenedor-texto" onclick="document.getElementById('input-oculto').focus()">
                <input type="text" id="input-oculto" oninput="procesar()" autocomplete="off">
                <div id="contenido-ejercicio">Por favor, selecciona una lección del menú derecho...</div>
            </div>

            <div id="instruccion-dedo" style="text-align:center; color:red; font-weight:bold; font-size:18px; margin-bottom:15px;">POSICIÓN INICIAL: ASDF - JKLÑ</div>

            <div class="teclado-container">
                <div class="fila-teclado">
                    <div class="tecla m-izq">º<br>\</div><div class="tecla m-izq">1<br>!</div><div class="tecla m-izq">2<br>"</div><div class="tecla a-izq">3<br>·</div><div class="tecla med-izq">4<br>$</div><div class="tecla i-izq">5<br>%</div><div class="tecla i-izq">6<br>&</div><div class="tecla i-der">7<br>/</div><div class="tecla i-der">8<br>(</div><div class="tecla med-der">9<br>)</div><div class="tecla a-der">0<br>=</div><div class="tecla m-der">'<br>?</div><div class="tecla m-der">¡<br>¿</div>
                </div>
                <div class="fila-teclado">
                    <div class="tecla tab">Tab</div><div class="tecla m-izq">Q</div><div class="tecla a-izq">W</div><div class="tecla med-izq">E</div><div class="tecla i-izq">R</div><div class="tecla i-izq">T</div><div class="tecla i-der">Y</div><div class="tecla i-der">U</div><div class="tecla med-der">I</div><div class="tecla a-der">O</div><div class="tecla m-der">P</div><div class="tecla m-der">^<br>[</div><div class="tecla m-der">*<br>]</div>
                </div>
                <div class="fila-teclado">
                    <div class="tecla caps">Bloq Mayús</div><div class="tecla m-izq">A</div><div class="tecla a-izq">S</div><div class="tecla med-izq">D</div><div class="tecla i-izq">F</div><div class="tecla i-izq">G</div><div class="tecla i-der">H</div><div class="tecla i-der">J</div><div class="tecla med-der">K</div><div class="tecla a-der">L</div><div class="tecla m-der">Ñ</div><div class="tecla m-der">¨<br>{</div><div class="tecla enter">Enter</div>
                </div>
                <div class="fila-teclado">
                    <div class="tecla shift-l">Mayús</div><div class="tecla m-izq"><<br>></div><div class="tecla m-izq">Z</div><div class="tecla a-izq">X</div><div class="tecla med-izq">C</div><div class="tecla i-izq">V</div><div class="tecla i-izq">B</div><div class="tecla i-der">N</div><div class="tecla i-der">M</div><div class="tecla med-der">, <br>;</div><div class="tecla a-der">. <br>:</div><div class="tecla m-der">- <br>_</div><div class="tecla shift-r">Mayús</div>
                </div>
                <div class="fila-teclado">
                    <div class="tecla espacio">BARRA ESPACIADORA</div>
                </div>
            </div>
        </div>

        <div class="sidebar-derecha">
            <button class="btn-fase active" id="btn-f1" onclick="cambiarFase(1)">1. APRENDIZAJE</button>
            <button class="btn-fase" id="btn-f2" onclick="cambiarFase(2)">2. PRÁCTICA</button>
            <button class="btn-fase" id="btn-f3" onclick="cambiarFase(3)">3. PERFECCIONAMIENTO</button>
            <hr>
            <div id="acordeon-lecciones"></div>
        </div>
    </div>
</div>

<script>
const BASE_URL_NUBE = "https://raw.githubusercontent.com/Jhonbonet/ejercicios/main/"; 
let currentUser = "", faseActual = 1, textoActivo = "", ejercicioActual = 0;

function login() {
    currentUser = document.getElementById('user-id').value;
    if(!currentUser) { alert("Ingresa un nombre"); return; }
    document.getElementById('inicio').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    cambiarFase(1);
}

function cambiarFase(num) {
    faseActual = num;
    document.querySelectorAll('.btn-fase').forEach((b, i) => b.classList.toggle('active', i+1 === num));
    renderizarMenu();
}

function renderizarMenu() {
    const contenedor = document.getElementById('acordeon-lecciones');
    contenedor.innerHTML = "";
    for(let l = 1; l <= 10; l++) {
        let div = document.createElement("div");
        div.innerHTML = `<div style="background:#008282; color:white; padding:5px; margin-top:10px; font-size:12px;">LECCIÓN ${l}</div>`;
        let grid = document.createElement("div");
        grid.className = "lista-ejercicios";
        for(let e = 1; e <= 10; e++) {
            let num = ((faseActual - 1) * 100) + ((l - 1) * 10) + e;
            let btn = document.createElement("div");
            btn.className = "btn-ejer" + (localStorage.getItem(`${currentUser}_ex_${num}`) ? " done" : "");
            btn.innerText = e;
            btn.onclick = () => cargarEjercicioNube(num);
            grid.appendChild(btn);
        }
        contenedor.appendChild(div);
        contenedor.appendChild(grid);
    }
}

async function cargarEjercicioNube(id) {
    const pantalla = document.getElementById('contenido-ejercicio');
    pantalla.innerText = "Cargando lección...";
    try {
        const res = await fetch(`${BASE_URL_NUBE}${id}.txt?t=${new Date().getTime()}`);
        if(!res.ok) throw new Error();
        const buffer = await res.arrayBuffer();
        
        // Decodificación Windows-1252 para Ñ y tildes
        textoActivo = new TextDecoder('windows-1252').decode(buffer).replace(/\r/g, "").trim();
        
        ejercicioActual = id;
        document.getElementById('input-oculto').value = "";
        actualizarTablero(0);
        setTimeout(() => document.getElementById('input-oculto').focus(), 200);
    } catch (e) {
        pantalla.innerHTML = `<span style="color:red">Error: No se encontró el archivo ${id}.txt en el servidor.</span>`;
    }
}

function actualizarTablero(pos) {
    const cont = document.getElementById('contenido-ejercicio');
    cont.innerHTML = "";
    for (let i = 0; i < textoActivo.length; i++) {
        let span = document.createElement("span");
        span.innerText = textoActivo[i];
        span.className = i < pos ? "letra-hecha" : (i === pos ? "letra-guia" : "");
        cont.appendChild(span);
    }
}

function procesar() {
    if (!textoActivo) return;
    const val = document.getElementById('input-oculto').value;
    actualizarTablero(val.length);
    
    if (val.length >= textoActivo.length) {
        localStorage.setItem(`${currentUser}_ex_${ejercicioActual}`, "1");
        alert("¡Felicidades! Has terminado el ejercicio " + ejercicioActual);
        renderizarMenu();
        document.getElementById('contenido-ejercicio').innerText = "Selecciona otra lección...";
    }
}
</script>
</body>
</html>
