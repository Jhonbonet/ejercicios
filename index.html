<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MecaMatic 3.0 - Sistema 300 Ejercicios</title>
<style>
:root {
    --pinky: #FFFFC0;
    --ring: #C0FFC0;
    --middle: #C0FFFF;
    --index-l: #FFC0FF;
    --index-r: #FF96FF;
    --thumb: #FFC0C0;
    --guia: #ff0000;
    --board-bg: #008282;
    --text-untyped: #ffffff;
    --text-typed: #000000;
}

body { font-family: 'Courier New', monospace; background-color: #C0C0C0; display: flex; flex-direction: column; align-items: center; padding: 5px; margin: 0; }
#inicio, #app { width: 95%; max-width: 1100px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid #888; }
.hidden { display: none; }

/* PANTALLA VERDE - ELIMINACIÓN DE MARGEN SUPERIOR */
.pantalla-verde { 
    font-size: 22px; 
    background-color: var(--board-bg); 
    color: var(--text-untyped); 
    border: 4px inset #004d40; 
    padding: 0px 15px; /* Cero padding superior e inferior */
    height: 135px; 
    overflow: hidden; 
    letter-spacing: 1px; 
    white-space: pre-wrap; 
    line-height: 22px; /* Altura de línea igual al tamaño de fuente */
    position: relative; 
    margin-bottom: 10px;
}

#contenido-ejercicio {
    display: block;
    margin-top: -4px; /* Margen negativo para eliminar el espacio de reserva superior */
}

#input-oculto { position: absolute; top: 0; left: 0; opacity: 0; pointer-events: none; }
.letra-hecha { color: var(--text-typed); }
.letra-guia { background-color: var(--guia); color: white !important; animation: blinker 0.8s linear infinite; }
@keyframes blinker { 50% { opacity: 0; } }

/* Layout Principal */
.contenedor-principal { display: flex; gap: 15px; }
.columna-izquierda { flex: 2.5; }
.sidebar-derecha { flex: 1; background: #f0f0f0; border: 2px solid #008282; border-radius: 8px; padding: 10px; height: 82vh; overflow-y: auto; }

/* TECLADO */
.teclado-container { background: #999; padding: 15px; border-radius: 12px; border: 3px solid #444; user-select: none; }
.fila-teclado { display: flex; justify-content: center; gap: 4px; margin-bottom: 4px; }
.tecla {
    width: 46px; height: 46px; background: white; border: 1px solid #000;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    font-weight: bold; font-size: 12px; border-radius: 5px; box-shadow: 2px 2px 0px #333;
}
.tecla.tab { width: 70px; }
.tecla.caps { width: 80px; }
.tecla.enter { width: 100px; flex-grow: 1; }
.tecla.shift-l, .tecla.shift-r { width: 110px; }
.tecla.espacio { width: 340px; background: var(--thumb); }

/* Colores Dedos */
.m-izq { background-color: var(--pinky); } .a-izq { background-color: var(--ring); }
.med-izq { background-color: var(--middle); } .i-izq { background-color: var(--index-l); }
.i-der { background-color: var(--index-r); } .med-der { background-color: var(--middle); }
.a-der { background-color: var(--ring); } .m-der { background-color: var(--pinky); }

/* Menu Lateral */
.btn-fase { padding: 10px; cursor: pointer; border: 2px solid #008282; background: #ddd; font-weight: bold; margin-bottom: 5px; width: 100%; border-radius: 5px; }
.btn-fase.active { background: #008282; color: white; }
.lista-ejercicios { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 15px; }
.btn-ejer { font-size: 10px; padding: 5px; cursor: pointer; border: 1px solid #aaa; text-align: center; background: white; }
.btn-ejer.done { background: #c0ffc0; }
</style>
</head>
<body>

<div id="inicio">
    <h1 style="color:#008282; text-align:center; margin:10px;">MecaMatic 3.0</h1>
    <div style="text-align:center; padding: 15px; border: 2px dashed #008282;">
        <label>Usuario:</label>
        <input type="text" id="user-id">
        <button onclick="login()" style="background:#008282; color:white; border:none; padding:5px 15px; cursor:pointer;">ENTRAR</button>
    </div>
</div>

<div id="app" class="hidden">
    <div class="contenedor-principal">
        <div class="columna-izquierda">
            <div class="pantalla-verde" onclick="document.getElementById('input-oculto').focus()">
                <input type="text" id="input-oculto" oninput="procesar()" autocomplete="off">
                <div id="contenido-ejercicio">Selecciona una lección...</div>
            </div>

            <div id="instruccion-dedo" style="text-align:center; color:red; font-weight:bold; margin-bottom:10px;">ASDF - JKLÑ</div>

            <div class="teclado-container">
                <div class="fila-teclado">
                    <div class="tecla m-izq">º</div><div class="tecla m-izq">1</div><div class="tecla m-izq">2</div><div class="tecla a-izq">3</div><div class="tecla med-izq">4</div><div class="tecla i-izq">5</div><div class="tecla i-izq">6</div><div class="tecla i-der">7</div><div class="tecla i-der">8</div><div class="tecla med-der">9</div><div class="tecla a-der">0</div><div class="tecla m-der">'</div><div class="tecla m-der">¡</div>
                </div>
                <div class="fila-teclado">
                    <div class="tecla tab">Tab</div><div class="tecla m-izq">Q</div><div class="tecla a-izq">W</div><div class="tecla med-izq">E</div><div class="tecla i-izq">R</div><div class="tecla i-izq">T</div><div class="tecla i-der">Y</div><div class="tecla i-der">U</div><div class="tecla med-der">I</div><div class="tecla a-der">O</div><div class="tecla m-der">P</div><div class="tecla m-der">^</div><div class="tecla m-der">*</div>
                </div>
                <div class="fila-teclado">
                    <div class="tecla caps">Mayús</div><div class="tecla m-izq">A</div><div class="tecla a-izq">S</div><div class="tecla med-izq">D</div><div class="tecla i-izq">F</div><div class="tecla i-izq">G</div><div class="tecla i-der">H</div><div class="tecla i-der">J</div><div class="tecla med-der">K</div><div class="tecla a-der">L</div><div class="tecla m-der">Ñ</div><div class="tecla m-der">¨</div><div class="tecla enter">Enter</div>
                </div>
                <div class="fila-teclado">
                    <div class="tecla shift-l">Mayús</div><div class="tecla m-izq"><</div><div class="tecla m-izq">Z</div><div class="tecla a-izq">X</div><div class="tecla med-izq">C</div><div class="tecla i-izq">V</div><div class="tecla i-izq">B</div><div class="tecla i-der">N</div><div class="tecla i-der">M</div><div class="tecla med-der">,</div><div class="tecla a-der">.</div><div class="tecla m-der">-</div><div class="tecla shift-r">Mayús</div>
                </div>
                <div class="fila-teclado">
                    <div class="tecla espacio"> </div>
                </div>
            </div>
        </div>

        <div class="sidebar-derecha">
            <button class="btn-fase active" onclick="cambiarFase(1)">1. APRENDIZAJE</button>
            <button class="btn-fase" onclick="cambiarFase(2)">2. PRÁCTICA</button>
            <button class="btn-fase" onclick="cambiarFase(3)">3. PERFECCIONAMIENTO</button>
            <div id="acordeon-lecciones"></div>
        </div>
    </div>
</div>

<script>
const BASE_URL_NUBE = "https://raw.githubusercontent.com/Jhonbonet/ejercicios/main/"; 
let currentUser = "", faseActual = 1, textoActivo = "", ejercicioActual = 0;

function login() {
    currentUser = document.getElementById('user-id').value;
    if(!currentUser) return;
    document.getElementById('inicio').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    cambiarFase(1);
}

function cambiarFase(num) {
    faseActual = num;
    document.querySelectorAll('.btn-fase').forEach((b, i) => b.classList.toggle('active', i+1 === num));
    renderizarMenu();
}

function renderizarMenu() {
    const contenedor = document.getElementById('acordeon-lecciones');
    contenedor.innerHTML = "";
    for(let l = 1; l <= 10; l++) {
        let div = document.createElement("div");
        div.innerHTML = `<div style="background:#008282; color:white; padding:3px; margin-top:5px; font-size:11px; font-weight:bold;">LECCIÓN ${l}</div>`;
        let grid = document.createElement("div");
        grid.className = "lista-ejercicios";
        for(let e = 1; e <= 10; e++) {
            let num = ((faseActual - 1) * 100) + ((l - 1) * 10) + e;
            let btn = document.createElement("div");
            btn.className = "btn-ejer" + (localStorage.getItem(`${currentUser}_ex_${num}`) ? " done" : "");
            btn.innerText = e;
            btn.onclick = () => cargarEjercicioNube(num);
            grid.appendChild(btn);
        }
        contenedor.appendChild(div);
        contenedor.appendChild(grid);
    }
}

async function cargarEjercicioNube(id) {
    const pantalla = document.getElementById('contenido-ejercicio');
    pantalla.innerText = "Cargando...";
    try {
        const res = await fetch(`${BASE_URL_NUBE}${id}.txt?t=${new Date().getTime()}`);
        const buffer = await res.arrayBuffer();
        textoActivo = new TextDecoder('windows-1252').decode(buffer).replace(/\r/g, "").trim();
        ejercicioActual = id;
        document.getElementById('input-oculto').value = "";
        actualizarTablero(0);
        setTimeout(() => document.getElementById('input-oculto').focus(), 200);
    } catch (e) {
        pantalla.innerHTML = `<span style="color:red">Error: Ejercicio ${id} no disponible.</span>`;
    }
}

function actualizarTablero(pos) {
    const cont = document.getElementById('contenido-ejercicio');
    cont.innerHTML = "";
    for (let i = 0; i < textoActivo.length; i++) {
        let span = document.createElement("span");
        span.innerText = textoActivo[i];
        span.className = i < pos ? "letra-hecha" : (i === pos ? "letra-guia" : "");
        cont.appendChild(span);
    }
}

function procesar() {
    if (!textoActivo) return;
    const val = document.getElementById('input-oculto').value;
    actualizarTablero(val.length);
    if (val.length >= textoActivo.length) {
        localStorage.setItem(`${currentUser}_ex_${ejercicioActual}`, "1");
        alert("¡Ejercicio " + ejercicioActual + " completado!");
        renderizarMenu();
    }
}
</script>
</body>
</html>
