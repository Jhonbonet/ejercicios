<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MecaMatic 4.0 ADN - Pro Edition</title>
<style>
:root {
    --pinky: #FFFFC0; --ring: #C0FFC0; --middle: #C0FFFF;
    --index-l: #FFC0FF; --index-r: #FF96FF; --thumb: #FFC0C0;
    --guia: #ff0000; --board-bg: #008282; --text-untyped: #ffffff;
    --text-typed: #000000;
}

body { font-family: 'Courier New', monospace; background-color: #C0C0C0; display: flex; flex-direction: column; align-items: center; padding: 5px; margin: 0; }
#inicio, #app { width: 95%; max-width: 1100px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid #888; }
.hidden { display: none; }

.pantalla-verde { 
    font-size: 26px; background-color: var(--board-bg); color: var(--text-untyped); 
    border: 4px inset #004d40; padding: 10px; margin-bottom: 10px;
    height: auto; min-height: 60px; display: flex; align-items: flex-start;
    overflow: hidden; letter-spacing: 1px; white-space: pre-wrap; line-height: 1.1; 
    position: relative; cursor: text; word-wrap: break-word;
}

#input-oculto { position: absolute; top: 0; left: 0; opacity: 0; pointer-events: none; }
.letra-hecha { color: var(--text-typed); opacity: 0.7; }
.letra-guia { background-color: var(--guia); color: white !important; animation: blinker 0.6s linear infinite; }

@keyframes blinker { 50% { opacity: 0.3; } }
@keyframes blinker-key { 50% { background-color: #ff0000; color: white; transform: scale(1.05); } }

.tecla-activa { animation: blinker-key 0.6s linear infinite !important; z-index: 10; border: 2px solid black !important; }

/* LAYOUT */
.contenedor-principal { display: flex; gap: 15px; }
.columna-izquierda { flex: 2.5; }
.sidebar-derecha { flex: 1; background: #f0f0f0; border: 2px solid #008282; border-radius: 8px; padding: 10px; height: 85vh; overflow-y: auto; }

/* TECLADO MEJORADO */
.teclado-container { background: #444; padding: 12px; border-radius: 12px; border: 4px solid #222; user-select: none; }
.fila-teclado { display: flex; justify-content: center; gap: 4px; margin-bottom: 5px; }
.tecla {
    width: 48px; height: 50px; background: white; border: 1px solid #000;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    font-weight: bold; font-size: 11px; border-radius: 6px; box-shadow: 2px 3px 0px #111;
    position: relative; transition: 0.1s;
}
.tecla span.sup { font-size: 10px; color: #555; margin-bottom: -2px; }
.tecla.tab { width: 70px; } .tecla.caps { width: 85px; } .tecla.enter { width: 100px; background: #888; color: white; }
.tecla.shift-l, .tecla.shift-r { width: 115px; } .tecla.espacio { width: 350px; background: var(--thumb); }

/* COLORES DEDOS */
.m-izq { background: var(--pinky); } .a-izq { background: var(--ring); }
.med-izq { background: var(--middle); } .i-izq { background: var(--index-l); }
.i-der { background: var(--index-r); } .med-der { background: var(--middle); }
.a-der { background: var(--ring); } .m-der { background: var(--pinky); }

table { width: 100%; border-collapse: collapse; }
th, td { border: 1px solid #888; padding: 6px; text-align: center; }
th { background: #008282; color: white; }
.btn-fase { padding: 10px; cursor: pointer; border: 2px solid #008282; background: #ddd; font-weight: bold; width: 100%; margin-bottom: 5px; }
.btn-fase.active { background: #008282; color: white; }
.lista-ejercicios { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 15px; }
.btn-ejer { font-size: 10px; padding: 5px; cursor: pointer; border: 1px solid #aaa; text-align: center; background: white; }
.btn-ejer.done { background: #c0ffc0; border: 2px solid #008282; }
</style>
</head>
<body>

<div id="inicio">
    <h1 style="color:#008282; text-align:center;">MecaMatic 4.0 ADN</h1>
    <div style="text-align:center; padding: 20px; border: 2px dashed #008282;">
        <input type="text" id="user-id" placeholder="Nombre del Estudiante..." style="padding:10px; width:250px; font-size: 16px;">
        <button onclick="login()" style="background:#008282; color:white; padding:10px 25px; border:none; cursor:pointer; font-weight:bold;">INGRESAR</button>
    </div>
</div>

<div id="app" class="hidden">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <div>
            <button onclick="mostrarHistorial()" style="background:#444; color:white; padding:8px 15px; border:none; cursor:pointer; border-radius:4px;">LOGROS</button>
            <button onclick="logout()" style="background:#d9534f; color:white; padding:8px 15px; border:none; cursor:pointer; border-radius:4px; margin-left: 5px;">SALIR</button>
        </div>
        <div>
            <span id="display-user" style="font-weight:bold; color:#008282;"></span>
            <span id="stats-live" style="margin-left:20px; font-weight:bold; color:#d9534f;">Errores: <span id="err-count">0</span>/5</span>
        </div>
    </div>

    <div class="contenedor-principal">
        <div class="columna-izquierda">
            <div class="pantalla-verde" onclick="document.getElementById('input-oculto').focus()">
                <input type="text" id="input-oculto" oninput="procesar()" onkeydown="teclaEnter(event)" autocomplete="off">
                <div id="contenido-ejercicio">Selecciona una lección a la derecha...</div>
            </div>

            <div id="instruccion-dedo" style="text-align:center; color:#333; font-weight:bold; margin-bottom:10px; font-size: 18px; min-height: 24px;"></div>

            <div class="teclado-container" id="teclado-visual">
                <div class="fila-teclado">
                    <div class="tecla m-izq" id="key-º"><span class="sup">ª</span>º</div>
                    <div class="tecla m-izq" id="key-1"><span class="sup">!</span>1</div>
                    <div class="tecla m-izq" id="key-2"><span class="sup">"</span>2</div>
                    <div class="tecla a-izq" id="key-3"><span class="sup">·</span>3</div>
                    <div class="tecla med-izq" id="key-4"><span class="sup">$</span>4</div>
                    <div class="tecla i-izq" id="key-5"><span class="sup">%</span>5</div>
                    <div class="tecla i-izq" id="key-6"><span class="sup">&</span>6</div>
                    <div class="tecla i-der" id="key-7"><span class="sup">/</span>7</div>
                    <div class="tecla i-der" id="key-8"><span class="sup">(</span>8</div>
                    <div class="tecla med-der" id="key-9"><span class="sup">)</span>9</div>
                    <div class="tecla a-der" id="key-0"><span class="sup">=</span>0</div>
                    <div class="tecla m-der" id="key-'"><span class="sup">?</span>'</div>
                    <div class="tecla m-der" id="key-¡"><span class="sup">¿</span>¡</div>
                </div>
                <div class="fila-teclado">
                    <div class="tecla tab">Tab</div>
                    <div class="tecla m-izq" id="key-Q">Q</div><div class="tecla a-izq" id="key-W">W</div>
                    <div class="tecla med-izq" id="key-E">E</div><div class="tecla i-izq" id="key-R">R</div>
                    <div class="tecla i-izq" id="key-T">T</div><div class="tecla i-der" id="key-Y">Y</div>
                    <div class="tecla i-der" id="key-U">U</div><div class="tecla med-der" id="key-I">I</div>
                    <div class="tecla a-der" id="key-O">O</div><div class="tecla m-der" id="key-P">P</div>
                    <div class="tecla m-der" id="key-^"><span class="sup">[</span>^</div>
                    <div class="tecla m-der" id="key-*"><span class="sup">]</span>*</div>
                </div>
                <div class="fila-teclado">
                    <div class="tecla caps">Bloq M</div>
                    <div class="tecla m-izq" id="key-A">A</div><div class="tecla a-izq" id="key-S">S</div>
                    <div class="tecla med-izq" id="key-D">D</div><div class="tecla i-izq" id="key-F">F</div>
                    <div class="tecla i-izq" id="key-G">G</div><div class="tecla i-der" id="key-H">H</div>
                    <div class="tecla i-der" id="key-J">J</div><div class="tecla med-der" id="key-K">K</div>
                    <div class="tecla a-der" id="key-L">L</div><div class="tecla m-der" id="key-Ñ">Ñ</div>
                    <div class="tecla m-der" id="key-¨"><span class="sup">{</span>¨</div>
                    <div class="tecla enter" id="key-ENTER">ENTER</div>
                </div>
                <div class="fila-teclado">
                    <div class="tecla shift-l" id="key-SHIFT-L">SHIFT</div>
                    <div class="tecla m-izq" id="key-<"><span class="sup">></span><</div>
                    <div class="tecla m-izq" id="key-Z">Z</div><div class="tecla a-izq" id="key-X">X</div>
                    <div class="tecla med-izq" id="key-C">C</div><div class="tecla i-izq" id="key-V">V</div>
                    <div class="tecla i-izq" id="key-B">B</div><div class="tecla i-der" id="key-N">N</div>
                    <div class="tecla i-der" id="key-M">M</div><div class="tecla med-der" id="key-,"><span class="sup">;</span>,</div>
                    <div class="tecla a-der" id="key-."><span class="sup">:</span>.</div>
                    <div class="tecla m-der" id="key--"><span class="sup">_</span>-</div>
                    <div class="tecla shift-r" id="key-SHIFT-R">SHIFT</div>
                </div>
                <div class="fila-teclado">
                    <div class="tecla espacio" id="key- "> </div>
                </div>
            </div>
        </div>

        <div class="sidebar-derecha">
            <button class="btn-fase active" onclick="cambiarFase(1)">1. APRENDIZAJE</button>
            <button class="btn-fase" onclick="cambiarFase(2)">2. PRÁCTICA</button>
            <button class="btn-fase" onclick="cambiarFase(3)">3. PERFECCIONAMIENTO</button>
            <div id="acordeon-lecciones"></div>
        </div>
    </div>
</div>

<div id="modal-historial" class="hidden" style="position:fixed; background:rgba(0,0,0,0.8); top:0; left:0; width:100%; height:100%; z-index:1000;">
    <div style="background:white; margin:5% auto; width:80%; padding:20px; border-radius:8px;">
        <h2>Tu Historial en la Nube</h2>
        <div id="cuerpo-historial"></div>
        <button onclick="document.getElementById('modal-historial').classList.add('hidden')" style="width:100%; padding:10px; margin-top:10px;">CERRAR</button>
    </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx06fFp8LrUC-8XN3iEBaPtFW_dJCmp_5Tx2VlBsoP0wQwoiHv7tGfw2-AEcpVeU-spSQ/exec";
const BASE_URL_NUBE = "https://raw.githubusercontent.com/Jhonbonet/ejercicios/main/"; 

let currentUser = "", faseActual = 1, textoActivo = "", ejercicioActual = 0;
let erroresContador = 0, tInicio = null, esperandoInicio = false;

const ctxAudio = new (window.AudioContext || window.webkitAudioContext)();

function sonido(frec, tipo, dur) {
    const osc = ctxAudio.createOscillator();
    const gain = ctxAudio.createGain();
    osc.type = tipo; osc.frequency.value = frec;
    gain.gain.setValueAtTime(0.1, ctxAudio.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctxAudio.currentTime + dur);
    osc.connect(gain); gain.connect(ctxAudio.destination);
    osc.start(); osc.stop(ctxAudio.currentTime + dur);
}

const simbolosShift = {
    '!':'1', '"':'2', '·':'3', '$':'4', '%':'5', '&':'6', '/':'7', '(':'8', ')':'9', '=':'0', '?':"'", '¿':'¡',
    '>':'<', ';':',', ':':'.', '_':'-', '{':'¨', '[':'^', ']':'*', 'ª':'º'
};

const mapaDedos = {
    'q':'MEÑIQUE IZQ', 'a':'MEÑIQUE IZQ', 'z':'MEÑIQUE IZQ', '1':'MEÑIQUE IZQ', 'º':'MEÑIQUE IZQ', '<':'MEÑIQUE IZQ',
    'w':'ANULAR IZQ', 's':'ANULAR IZQ', 'x':'ANULAR IZQ', '2':'ANULAR IZQ',
    'e':'MEDIO IZQ', 'd':'MEDIO IZQ', 'c':'MEDIO IZQ', '3':'MEDIO IZQ',
    'r':'ÍNDICE IZQ', 'f':'ÍNDICE IZQ', 'v':'ÍNDICE IZQ', '4':'ÍNDICE IZQ', 't':'ÍNDICE IZQ', 'g':'ÍNDICE IZQ', 'b':'ÍNDICE IZQ', '5':'ÍNDICE IZQ',
    'y':'ÍNDICE DER', 'h':'ÍNDICE DER', 'n':'ÍNDICE DER', '6':'ÍNDICE DER', 'u':'ÍNDICE DER', 'j':'ÍNDICE DER', 'm':'ÍNDICE DER', '7':'ÍNDICE DER',
    'i':'MEDIO DER', 'k':'MEDIO DER', ',':'MEDIO DER', '8':'MEDIO DER',
    'o':'ANULAR DER', 'l':'ANULAR DER', '.':'ANULAR DER', '9':'ANULAR DER',
    'p':'MEÑIQUE DER', 'ñ':'MEÑIQUE DER', '-':'MEÑIQUE DER', '0':'MEÑIQUE DER', '¡':'MEÑIQUE DER', "'":'MEÑIQUE DER',
    ' ':'PULGAR'
};

function login() {
    currentUser = document.getElementById('user-id').value.trim().toLowerCase();
    if(!currentUser) return alert("Ingresa tu nombre");
    document.getElementById('display-user').innerText = "ESTUDIANTE: " + currentUser.toUpperCase();
    document.getElementById('inicio').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    cambiarFase(1);
}

function logout() { location.reload(); }

function cambiarFase(n) { faseActual = n; renderizarMenu(); }

function renderizarMenu() {
    const cont = document.getElementById('acordeon-lecciones');
    cont.innerHTML = "";
    for(let l=1; l<=10; l++) {
        cont.innerHTML += `<div style="background:#008282; color:white; padding:5px; font-size:12px; margin-top:5px;">LECCIÓN ${l}</div>`;
        let grid = document.createElement('div'); grid.className = "lista-ejercicios";
        for(let e=1; e<=10; e++) {
            let id = ((faseActual-1)*100) + ((l-1)*10) + e;
            grid.innerHTML += `<div class="btn-ejer" onclick="cargarEjercicio(${id})">${e}</div>`;
        }
        cont.appendChild(grid);
    }
}

async function cargarEjercicio(id) {
    try {
        const res = await fetch(`${BASE_URL_NUBE}${id}.txt`);
        const buffer = await res.arrayBuffer();
        textoActivo = new TextDecoder('windows-1252').decode(buffer).replace(/\r/g, "").trim();
        ejercicioActual = id;
        erroresContador = 0;
        document.getElementById('err-count').innerText = "0";
        document.getElementById('contenido-ejercicio').innerHTML = "<span style='color:red'>PRESIONA [ENTER] PARA COMENZAR</span>";
        esperandoInicio = true;
        resaltarTecla("ENTER");
    } catch(e) { alert("Error al cargar texto"); }
}

function teclaEnter(e) {
    if(esperandoInicio && e.key === "Enter") {
        esperandoInicio = false;
        document.getElementById('input-oculto').value = "";
        tInicio = new Date();
        actualizarTablero(0);
    }
}

function resaltarTecla(char) {
    document.querySelectorAll('.tecla').forEach(t => t.classList.remove('tecla-activa'));
    
    if(char === "ENTER") {
        document.getElementById('key-ENTER').classList.add('tecla-activa');
        return;
    }

    let teclaID = char.toUpperCase();
    let necesitaShift = false;

    if(/[A-Z]/.test(char)) necesitaShift = true;
    if(simbolosShift[char]) {
        teclaID = simbolosShift[char];
        necesitaShift = true;
    }

    const el = document.getElementById('key-' + teclaID);
    if(el) el.classList.add('tecla-activa');

    if(necesitaShift) {
        document.getElementById('key-SHIFT-L').classList.add('tecla-activa');
        document.getElementById('key-SHIFT-R').classList.add('tecla-activa');
    }
}

function actualizarTablero(pos) {
    const cont = document.getElementById('contenido-ejercicio');
    cont.innerHTML = "";
    for(let i=0; i<textoActivo.length; i++) {
        let span = document.createElement("span");
        span.innerText = textoActivo[i];
        span.className = i < pos ? "letra-hecha" : (i === pos ? "letra-guia" : "");
        cont.appendChild(span);
    }
    if(pos < textoActivo.length) {
        let char = textoActivo[pos];
        resaltarTecla(char);
        document.getElementById('instruccion-dedo').innerText = `DEDO: ${mapaDedos[char.toLowerCase()] || '---'}`;
    }
}

function procesar() {
    if(esperandoInicio) return;
    const input = document.getElementById('input-oculto');
    let val = input.value;
    let pos = val.length - 1;

    if(val[pos] === textoActivo[pos]) {
        sonido(600, 'sine', 0.05); // Sonido teclado
        actualizarTablero(val.length);
        if(val.length >= textoActivo.length) finalizar();
    } else {
        sonido(150, 'sawtooth', 0.2); // Sonido error
        erroresContador++;
        document.getElementById('err-count').innerText = erroresContador;
        input.value = val.substring(0, pos);
        if(erroresContador > 5) {
            alert("Máximo de errores. Reintenta.");
            cargarEjercicio(ejercicioActual);
        }
    }
}

async function finalizar() {
    const ppm = Math.round(textoActivo.length / ((new Date() - tInicio)/60000));
    alert(`¡Completado! Velocidad: ${ppm} PPM`);
    
    const log = { action: 'save', user: currentUser, ejercicio: ejercicioActual, ppm: ppm, fecha: new Date().toLocaleDateString() };
    fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(log) });
}

function mostrarHistorial() {
    alert("Progreso guardado en Google Sheets. Consulta a tu tutor.");
}
</script>
</body>
</html>
