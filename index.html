<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MecaMatic 4.0 ADN - Pro</title>
<style>
    /* Estilos base mantenidos */
    :root {
        --pinky: #FFFFC0; --ring: #C0FFC0; --middle: #C0FFFF;
        --index-l: #FFC0FF; --index-r: #FF96FF; --thumb: #FFC0C0;
        --guia: #ff0000; --board-bg: #008282; --text-untyped: #ffffff;
        --text-typed: #000000;
    }
    body { font-family: 'Courier New', monospace; background-color: #C0C0C0; display: flex; flex-direction: column; align-items: center; padding: 5px; margin: 0; }
    #inicio, #app { width: 95%; max-width: 1100px; background: white; padding: 15px; border-radius: 8px; border: 1px solid #888; }
    .hidden { display: none; }
    .pantalla-verde { 
        font-size: 26px; background-color: var(--board-bg); color: var(--text-untyped); 
        border: 4px inset #004d40; padding: 15px; min-height: 100px; position: relative; 
    }
    #input-oculto { position: absolute; opacity: 0; }
    .letra-hecha { color: var(--text-typed); opacity: 0.6; }
    .letra-guia { background-color: var(--guia); color: white !important; animation: blinker 0.6s linear infinite; }
    @keyframes blinker { 50% { opacity: 0.3; } }
    @keyframes blinker-key { 50% { background-color: #ff0000 !important; color: white; transform: scale(1.05); } }
    .tecla-activa { animation: blinker-key 0.6s linear infinite !important; z-index: 10; border: 2px solid black !important; }
    .tecla { width: 48px; height: 50px; background: white; border: 1px solid #000; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 11px; border-radius: 6px; }
    /* ... (resto de estilos de teclado iguales al anterior) */
</style>
</head>
<body>

<div id="inicio">
    <h1 style="color:#008282; text-align:center;">MecaMatic 4.0 ADN</h1>
    <div style="text-align:center; padding: 20px;">
        <input type="text" id="user-id" placeholder="Nombre del Estudiante...">
        <button onclick="login()">INGRESAR</button>
    </div>
</div>

<div id="app" class="hidden">
    <div class="panel-info" style="display:flex; justify-content:space-between; background:#333; color:white; padding:10px;">
        <span id="display-user"></span>
        <div style="color: #5cb85c;">TIEMPO: <span id="timer">00:00</span></div>
        <div>ERRORES: <span id="err-count">0</span>/5</div>
    </div>
    <div class="pantalla-verde" onclick="document.getElementById('input-oculto').focus()">
        <input type="text" id="input-oculto" oninput="procesar()" onkeydown="teclaEnter(event)">
        <div id="contenido-ejercicio"></div>
    </div>
    <div id="instruccion-dedo" style="text-align:center; font-weight:bold; margin:10px;"></div>
    </div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx06fFp8LrUC-8XN3iEBaPtFW_dJCmp_5Tx2VlBsoP0wQwoiHv7tGfw2-AEcpVeU-spSQ/exec";
const BASE_URL_NUBE = "https://raw.githubusercontent.com/Jhonbonet/ejercicios/main/";

let currentUser = "", progresoCargado = {}, textoActivo = "", ejercicioActual = 0;
let erroresContador = 0, tInicio = null, timerInterval = null, esperandoInicio = false;

async function login() {
    currentUser = document.getElementById('user-id').value.trim().toUpperCase();
    if(!currentUser) return alert("Ingresa tu nombre");
    
    // SINCRONIZACIÓN NUBE: Carga historial de cualquier dispositivo
    try {
        const response = await fetch(`${WEB_APP_URL}?action=load&user=${currentUser}`);
        progresoCargado = await response.json();
        localStorage.setItem('mecamatic_v4_' + currentUser, JSON.stringify(progresoCargado));
    } catch(e) {
        console.log("Modo offline: Cargando local");
        const saved = localStorage.getItem('mecamatic_v4_' + currentUser);
        progresoCargado = saved ? JSON.parse(saved) : {};
    }

    document.getElementById('display-user').innerText = "ESTUDIANTE: " + currentUser;
    document.getElementById('inicio').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    renderizarMenu(); 
}

function resaltarTeclasEspeciales(char) {
    document.querySelectorAll('.tecla').forEach(t => t.classList.remove('tecla-activa'));
    
    // Lógica de Doble Tecla (Mayúsculas o Tildes)
    if (char === char.toUpperCase() && char !== char.toLowerCase() && char !== " ") {
        document.getElementById('key-SHIFT-L').classList.add('tecla-activa'); // Sugiere Shift
    }
    
    let keyId = char.toUpperCase();
    if (char === "á") { document.getElementById('key-´').classList.add('tecla-activa'); keyId = "A"; }
    if (char === "é") { document.getElementById('key-´').classList.add('tecla-activa'); keyId = "E"; }
    // ... repetir para í, ó, ú
    
    const tecla = document.getElementById('key-' + keyId);
    if(tecla) tecla.classList.add('tecla-activa');
}

function finalizar() {
    clearInterval(timerInterval);
    const tMin = (new Date() - tInicio) / 60000;
    const pBrutas = textoActivo.length;
    // Cálculo solicitado: Coefi MEP y velocidad base
    const ppmN = Math.round(((pBrutas - (erroresContador * 4)) / tMin)); 
    const prec = ((pBrutas - erroresContador) / pBrutas * 100).toFixed(2);
    const fecha = new Date().toLocaleDateString();

    const params = `?action=save&user=${encodeURIComponent(currentUser)}&ejercicio=${ejercicioActual}&ppm_netas=${ppmN}&errores=${erroresContador}&precision=${prec}&fecha=${encodeURIComponent(fecha)}`;
    
    // Guardado local y en nube (sincronizado)
    progresoCargado[ejercicioActual] = { ppmN, err: erroresContador, prec, fecha };
    localStorage.setItem('mecamatic_v4_' + currentUser, JSON.stringify(progresoCargado));
    
    fetch(WEB_APP_URL + params, { mode: 'no-cors' });
    alert(`¡Ejercicio Superado!\nNetas: ${ppmN} PPM\nPrecisión: ${prec}%`);
    location.reload();
}

// ... Resto de funciones (procesar, cargarEjercicio, teclaEnter) se mantienen igual
</script>
</body>
</html>
