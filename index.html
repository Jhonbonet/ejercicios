<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MecaMatic 4.0 ADN - Pro</title>
    <style>
        :root {
            --pinky: #FFFFC0; --ring: #C0FFC0; --middle: #C0FFFF;
            --index-l: #FFC0FF; --index-r: #FF96FF; --thumb: #FFC0C0;
            --guia: #ff0000; --board-bg: #008282; --text-untyped: #ffffff;
            --text-typed: #000000;
        }
        body { font-family: 'Courier New', monospace; background-color: #C0C0C0; display: flex; flex-direction: column; align-items: center; padding: 5px; margin: 0; }
        #inicio, #app { width: 95%; max-width: 1100px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid #888; margin-top: 20px; }
        .hidden { display: none !important; }
        
        .panel-info { display: flex; justify-content: space-between; background: #333; color: white; padding: 10px; border-radius: 5px; margin-bottom: 10px; font-size: 14px; align-items: center; }
        
        .pantalla-verde { 
            font-size: 26px; background-color: var(--board-bg); color: var(--text-untyped); 
            border: 4px inset #004d40; padding: 15px; margin-bottom: 10px; min-height: 120px; 
            display: flex; align-items: flex-start; flex-wrap: wrap; overflow: hidden; letter-spacing: 1px; 
            white-space: pre-wrap; line-height: 1.2; position: relative; cursor: text; word-wrap: break-word;
        }
        
        #input-oculto { position: absolute; top: 0; left: 0; opacity: 0; pointer-events: none; }
        .letra-hecha { color: var(--text-typed); opacity: 0.4; }
        .letra-guia { background-color: var(--guia); color: white !important; animation: blinker 0.6s linear infinite; border-radius: 2px; }
        
        @keyframes blinker { 50% { opacity: 0.3; } }
        @keyframes blinker-key-red { 50% { background-color: #ff0000 !important; color: white !important; transform: scale(1.02); } }
        
        .tecla-activa { animation: blinker-key-red 0.6s linear infinite !important; z-index: 10; border: 2px solid black !important; background-color: #ff0000 !important; color: white !important; }

        .contenedor-principal { display: flex; gap: 15px; }
        .columna-izquierda { flex: 2.5; }
        .sidebar-derecha { flex: 1; background: #f0f0f0; border: 2px solid #008282; border-radius: 8px; padding: 10px; height: 70vh; overflow-y: auto; }
        
        .teclado-container { background: #444; padding: 12px; border-radius: 12px; border: 4px solid #222; user-select: none; }
        .fila-teclado { display: flex; justify-content: center; gap: 4px; margin-bottom: 5px; }
        
        .tecla { 
            width: 48px; height: 50px; background: white; border: 1px solid #000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            font-weight: bold; font-size: 10px; border-radius: 6px; box-shadow: 2px 3px 0px #111; 
        }
        .tecla.enter { width: 100px; background: #888; color: white; font-size: 11px; }
        .tecla.espacio { width: 350px; background: var(--thumb); }
        
        .m-izq { background: var(--pinky); } .a-izq { background: var(--ring); } .med-izq { background: var(--middle); } .i-izq { background: var(--index-l); }
        .i-der { background: var(--index-r); } .med-der { background: var(--middle); } .a-der { background: var(--ring); } .m-der { background: var(--pinky); }
        
        .btn-fase { padding: 8px; cursor: pointer; border: 2px solid #008282; background: #ddd; font-weight: bold; width: 100%; margin-bottom: 5px; }
        .btn-fase.active { background: #008282; color: white; }
        .lista-ejercicios { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 15px; }
        .btn-ejer { font-size: 10px; padding: 5px; cursor: pointer; border: 1px solid #aaa; text-align: center; background: white; border-radius: 4px; }
        .btn-ejer.completado { background: #28a745 !important; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div id="inicio">
    <h1 style="color:#008282; text-align:center;">MecaMatic 4.0 ADN</h1>
    <div style="text-align:center; padding: 30px; border: 2px dashed #008282; background: #f9f9f9;">
        <p>Inicie sesiГіn para sincronizar su progreso en la nube:</p>
        <input type="text" id="user-id" placeholder="ID o Nombre de Estudiante..." style="padding:12px; width:280px; font-size: 16px; border: 2px solid #008282; border-radius: 5px;">
        <br><br>
        <button onclick="login()" style="background:#008282; color:white; padding:12px 40px; border:none; cursor:pointer; font-weight:bold; border-radius: 5px; font-size: 16px;">INGRESAR</button>
    </div>
</div>

<div id="app" class="hidden">
    <div class="panel-info">
        <div>
            <button onclick="logout()" style="background:#d9534f; color:white; border:none; padding:5px 10px; cursor:pointer; font-weight:bold; border-radius: 3px;">SALIR</button>
            <span id="display-user" style="margin-left:15px; font-weight:bold; color: #00ffcc;"></span>
        </div>
        <div style="font-size: 18px; color: #5cb85c; font-weight: bold;">TIEMPO: <span id="timer">00:00</span></div>
        <div style="font-weight: bold;">ERRORES: <span id="err-count">0</span>/5</div>
    </div>

    <div class="contenedor-principal">
        <div class="columna-izquierda">
            <div class="pantalla-verde" onclick="document.getElementById('input-oculto').focus()">
                <input type="text" id="input-oculto" oninput="procesar()" onkeydown="teclaEnter(event)" autocomplete="off">
                <div id="contenido-ejercicio" style="width: 100%;">Selecciona un ejercicio...</div>
            </div>
            <div id="instruccion-dedo" style="text-align:center; color:#333; font-weight:bold; margin-bottom:10px; font-size: 18px; min-height: 24px;"></div>

            <div class="teclado-container" id="teclado-visual">
                <div class="fila-teclado">
                    <div class="tecla m-izq" id="key-Вє">ВЄ<br>Вє</div>
                    <div class="tecla m-izq" id="key-1">!<br>1</div>
                    <div class="tecla m-izq" id="key-2">"<br>2</div>
                    <div class="tecla a-izq" id="key-3">#<br>3</div>
                    <div class="tecla med-izq" id="key-4">$<br>4</div>
                    <div class="tecla i-izq" id="key-5">%<br>5</div>
                    <div class="tecla i-izq" id="key-6">&<br>6</div>
                    <div class="tecla i-der" id="key-7">/<br>7</div>
                    <div class="tecla i-der" id="key-8">(<br>8</div>
                    <div class="tecla med-der" id="key-9">)<br>9</div>
                    <div class="tecla a-der" id="key-0">=<br>0</div>
                    <div class="tecla m-der" id="key-'">?<br>'</div>
                    <div class="tecla m-der" id="key-ВЎ">Вї<br>ВЎ</div>
                </div>
                <div class="fila-teclado">
                    <div class="tecla" style="width:60px">TAB</div>
                    <div class="tecla m-izq" id="key-Q">Q</div><div class="tecla a-izq" id="key-W">W</div><div class="tecla med-izq" id="key-E">E</div><div class="tecla i-izq" id="key-R">R</div><div class="tecla i-izq" id="key-T">T</div><div class="tecla i-der" id="key-Y">Y</div><div class="tecla i-der" id="key-U">U</div><div class="tecla med-der" id="key-I">I</div><div class="tecla a-der" id="key-O">O</div><div class="tecla m-der" id="key-P">P</div><div class="tecla m-der" id="key-Вґ">ВЁ<br>Вґ</div><div class="tecla m-der" id="key-^">^</div>
                </div>
                <div class="fila-teclado">
                    <div class="tecla" style="width:80px">BLOQ</div>
                    <div class="tecla m-izq" id="key-A">A</div><div class="tecla a-izq" id="key-S">S</div><div class="tecla med-izq" id="key-D">D</div><div class="tecla i-izq" id="key-F">F</div><div class="tecla i-izq" id="key-G">G</div><div class="tecla i-der" id="key-H">H</div><div class="tecla i-der" id="key-J">J</div><div class="tecla med-der" id="key-K">K</div><div class="tecla a-der" id="key-L">L</div><div class="tecla m-der" id="key-Г‘">Г‘</div><div class="tecla m-der" id="key-*">*</div>
                    <div class="tecla enter" id="key-ENTER">ENTER</div>
                </div>
                <div class="fila-teclado">
                    <div class="tecla" id="key-SHIFT-L" style="width:100px">SHIFT</div>
                    <div class="tecla m-izq" id="key-<">><br><</div><div class="tecla m-izq" id="key-Z">Z</div><div class="tecla a-izq" id="key-X">X</div><div class="tecla med-izq" id="key-C">C</div><div class="tecla i-izq" id="key-V">V</div><div class="tecla i-izq" id="key-B">B</div><div class="tecla i-der" id="key-N">N</div><div class="tecla i-der" id="key-M">M</div><div class="tecla med-der" id="key-,">;<br>,</div><div class="tecla a-der" id="key-.">:<br>.</div><div class="tecla m-der" id="key--">_<br>-</div>
                    <div class="tecla" id="key-SHIFT-R" style="width:100px">SHIFT</div>
                </div>
                <div class="fila-teclado">
                    <div class="tecla espacio" id="key- "> </div>
                </div>
            </div>
        </div>

        <div class="sidebar-derecha">
            <button class="btn-fase active" id="fase-1" onclick="cambiarFase(1)">1. APRENDIZAJE</button>
            <button class="btn-fase" id="fase-2" onclick="cambiarFase(2)">2. PRГЃCTICA</button>
            <button class="btn-fase" id="fase-3" onclick="cambiarFase(3)">3. PERFECCIONAMIENTO</button>
            <div id="acordeon-lecciones"></div>
        </div>
    </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx06fFp8LrUC-8XN3iEBaPtFW_dJCmp_5Tx2VlBsoP0wQwoiHv7tGfw2-AEcpVeU-spSQ/exec"; 
const BASE_URL_NUBE = "https://raw.githubusercontent.com/Jhonbonet/ejercicios/main/"; 

let currentUser = "", faseActual = 1, textoActivo = "", ejercicioActual = 0;
let erroresContador = 0, tInicio = null, esperandoInicio = false;
let timerSecs = 0, timerInterval = null, audioCtx = null;
let progresoCargado = {};

const mapaDedos = { 
    'q':'MEГ‘IQUE IZQ', 'a':'MEГ‘IQUE IZQ', 'z':'MEГ‘IQUE IZQ', '1':'MEГ‘IQUE IZQ', 'Вє':'MEГ‘IQUE IZQ', '<':'MEГ‘IQUE IZQ', '!':'MEГ‘IQUE IZQ', 'ВЄ':'MEГ‘IQUE IZQ',
    'w':'ANULAR IZQ', 's':'ANULAR IZQ', 'x':'ANULAR IZQ', '2':'ANULAR IZQ', '"':'ANULAR IZQ',
    'e':'MEDIO IZQ', 'd':'MEDIO IZQ', 'c':'MEDIO IZQ', '3':'MEDIO IZQ', '#':'MEDIO IZQ',
    'r':'ГЌNDICE IZQ', 'f':'ГЌNDICE IZQ', 'v':'ГЌNDICE IZQ', '4':'ГЌNDICE IZQ', '$':'ГЌNDICE IZQ',
    't':'ГЌNDICE IZQ', 'g':'ГЌNDICE IZQ', 'b':'ГЌNDICE IZQ', '5':'ГЌNDICE IZQ', '%':'ГЌNDICE IZQ',
    '6':'ГЌNDICE IZQ', '&':'ГЌNDICE IZQ',
    'y':'ГЌNDICE DER', 'h':'ГЌNDICE DER', 'n':'ГЌNDICE DER', '7':'ГЌNDICE DER', '/':'ГЌNDICE DER',
    'u':'ГЌNDICE DER', 'j':'ГЌNDICE DER', 'm':'ГЌNDICE DER', '8':'ГЌNDICE DER', '(':'ГЌNDICE DER',
    'i':'MEDIO DER', 'k':'MEDIO DER', ',':'MEDIO DER', '9':'MEDIO DER', ')':'MEDIO DER', ';':'MEDIO DER',
    'o':'ANULAR DER', 'l':'ANULAR DER', '.':'ANULAR DER', '0':'ANULAR DER', '=':'ANULAR DER', ':':'ANULAR DER',
    'p':'MEГ‘IQUE DER', 'Г±':'MEГ‘IQUE DER', 'Г‘':'MEГ‘IQUE DER', "'":'MEГ‘IQUE DER', '?':'MEГ‘IQUE DER', 'ВЎ':'MEГ‘IQUE DER', 'Вї':'MEГ‘IQUE DER', 'Вґ':'MEГ‘IQUE DER', 'ВЁ':'MEГ‘IQUE DER', '-':'MEГ‘IQUE DER', '_':'MEГ‘IQUE DER',
    ' ':'PULGAR' 
};

const shiftMap = {
    '!':'1', '"':'2', '#':'3', '$':'4', '%':'5', '&':'6', '/':'7', '(':'8', ')':'9', '=':'0', '?':"'", 'Вї':'ВЎ',
    '>':'<', ';':',', ':':'.', '_':'-', 'ВЄ':'Вє', 'ВЁ':'Вґ'
};

function sonar(frec, tipo, dur) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.type = tipo; osc.frequency.setValueAtTime(frec, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
}

async function login() {
    const inputUser = document.getElementById('user-id').value.trim().toUpperCase();
    if(!inputUser) return alert("Ingrese su ID");
    currentUser = inputUser;
    document.getElementById('display-user').innerText = "Sincronizando Nube...";
    
    try {
        const resp = await fetch(`${WEB_APP_URL}?action=load&user=${encodeURIComponent(currentUser)}`);
        const data = await resp.json();
        progresoCargado = data || {};
    } catch(e) {
        progresoCargado = JSON.parse(localStorage.getItem('meca_'+currentUser)) || {};
    }

    document.getElementById('display-user').innerText = "ESTUDIANTE: " + currentUser;
    document.getElementById('inicio').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    cambiarFase(1);
}

function logout() { location.reload(); }

function cambiarFase(n) {
    faseActual = n;
    document.querySelectorAll('.btn-fase').forEach((b, i) => b.classList.toggle('active', i+1 === n));
    renderizarMenu();
}

function renderizarMenu() {
    const cont = document.getElementById('acordeon-lecciones');
    cont.innerHTML = "";
    for(let l=1; l<=10; l++) {
        cont.innerHTML += `<div style="background:#008282; color:white; padding:5px; font-size:11px; margin-top:5px;">LECCIГ“N ${l}</div>`;
        let grid = document.createElement('div'); grid.className = "lista-ejercicios";
        for(let e=1; e<=10; e++) {
            let id = ((faseActual-1)*100) + ((l-1)*10) + e;
            let completado = progresoCargado[id] ? "completado" : "";
            grid.innerHTML += `<div class="btn-ejer ${completado}" id="ejer-${id}" onclick="cargarEjercicio(${id})">${e}</div>`;
        }
        cont.appendChild(grid);
    }
}

async function cargarEjercicio(id) {
    try {
        const res = await fetch(`${BASE_URL_NUBE}${id}.txt`);
        const buffer = await res.arrayBuffer();
        textoActivo = new TextDecoder('windows-1252').decode(buffer).replace(/\r/g, "").trim();
        ejercicioActual = id; 
        erroresContador = 0;
        document.getElementById('err-count').innerText = "0";
        actualizarTablero(0);
        timerSecs = 600;
        actualizarReloj();
        esperandoInicio = true;
        document.getElementById('input-oculto').focus();
        resaltarTeclaDual("ENTER");
    } catch(e) { alert("Error de red"); }
}

function teclaEnter(e) {
    if(esperandoInicio && e.key === "Enter") {
        esperandoInicio = false;
        document.getElementById('input-oculto').value = "";
        tInicio = new Date();
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timerSecs--; actualizarReloj();
            if(timerSecs <= 0) { clearInterval(timerInterval); alert("Tiempo agotado"); logout(); }
        }, 1000);
        actualizarTablero(0);
        sonar(600, 'sine', 0.1);
    }
}

function actualizarReloj() {
    let m = Math.floor(timerSecs / 60); let s = timerSecs % 60;
    document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
}

function resaltarTeclaDual(char) {
    document.querySelectorAll('.tecla').forEach(t => t.classList.remove('tecla-activa'));
    if(char === "ENTER") { document.getElementById('key-ENTER').classList.add('tecla-activa'); return; }

    let requiereShift = false;
    let teclaBase = char.toUpperCase();

    if (char !== " " && char === char.toUpperCase() && char !== char.toLowerCase()) requiereShift = true;
    if (shiftMap[char]) { requiereShift = true; teclaBase = shiftMap[char]; }

    const tildes = {'ГЎ':'A','Г©':'E','Г­':'I','Гі':'O','Гє':'U','ГЃ':'A','Г‰':'E','ГЌ':'I','Г“':'O','Гљ':'U'};
    if (tildes[char]) {
        document.getElementById('key-Вґ').classList.add('tecla-activa');
        teclaBase = tildes[char];
        if(char === char.toUpperCase()) requiereShift = true;
    }

    if (requiereShift) {
        const mano = (mapaDedos[char] || "").includes("DER") ? "L" : "R";
        document.getElementById('key-SHIFT-' + mano).classList.add('tecla-activa');
    }

    const tecla = document.getElementById('key-' + teclaBase);
    if(tecla) tecla.classList.add('tecla-activa');
}

function actualizarTablero(pos) {
    const cont = document.getElementById('contenido-ejercicio');
    cont.innerHTML = "";
    for(let i=0; i<textoActivo.length; i++) {
        let span = document.createElement("span");
        span.innerText = textoActivo[i];
        span.className = i < pos ? "letra-hecha" : (i === pos ? "letra-guia" : "");
        cont.appendChild(span);
    }
    if(!esperandoInicio && pos < textoActivo.length) {
        let char = textoActivo[pos];
        resaltarTeclaDual(char);
        document.getElementById('instruccion-dedo').innerText = `PULSAR: ${mapaDedos[char] || '---'}`;
    }
}

function procesar() {
    if(esperandoInicio) return;
    const input = document.getElementById('input-oculto');
    let val = input.value; let pos = val.length - 1;
    if(pos < 0) return;

    if(val[pos] === textoActivo[pos]) {
        sonar(400, 'triangle', 0.03);
        actualizarTablero(val.length);
        if(val.length >= textoActivo.length) finalizar();
    } else {
        sonar(100, 'square', 0.15);
        erroresContador++;
        document.getElementById('err-count').innerText = erroresContador;
        input.value = val.substring(0, pos);
        if(erroresContador >= 5) { 
            alert("META NO ALCANZADA: Demasiados errores (5). Debes repetir el ejercicio."); 
            cargarEjercicio(ejercicioActual); 
        }
    }
}

async function finalizar() {
    clearInterval(timerInterval);
    // Limpiar teclado al finalizar
    document.querySelectorAll('.tecla').forEach(t => t.classList.remove('tecla-activa'));
    
    const tMin = (new Date() - tInicio) / 60000;
    const pBrutas = textoActivo.length;
    const ppmN = Math.round((pBrutas - (erroresContador * 4)) / tMin);
    const prec = ((pBrutas - erroresContador) / pBrutas * 100).toFixed(2);
    const fecha = new Date().toLocaleDateString();

    // Guardar local
    progresoCargado[ejercicioActual] = { ppmN, prec };
    localStorage.setItem('meca_'+currentUser, JSON.stringify(progresoCargado));

    // Guardar Nube Sync
    const params = `?action=save&user=${encodeURIComponent(currentUser)}&ejercicio=${ejercicioActual}&ppm_netas=${ppmN}&errores=${erroresContador}&precision=${prec}&fecha=${encodeURIComponent(fecha)}`;
    
    document.getElementById('display-user').innerText = "Guardando progreso...";
    
    // SincronizaciГіn Real
    try {
        await fetch(WEB_APP_URL + params, { mode: 'no-cors' });
        document.getElementById('display-user').innerText = "ESTUDIANTE: " + currentUser + " (Sincronizado)";
    } catch(e) {
        console.log("Error de sync nube");
    }

    alert(`ВЎFELICIDADES! META ALCANZADA\n\nVelocidad: ${ppmN} PPM\nPrecisiГіn: ${prec}%\nErrores: ${erroresContador}`);

    // Pasar al siguiente automГЎticamente
    let proximo = ejercicioActual + 1;
    cargarEjercicio(proximo);
    renderizarMenu();
}
</script>
</body>
</html>
